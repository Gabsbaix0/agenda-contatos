<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda de Contatos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #4a90d9; color: white; }
        tr:hover { background: #f0f0f0; }
        a { color: #4a90d9; text-decoration: none; }
        .btn { padding: 8px 16px; border-radius: 4px; color: white; }
        button.btn { border: none; cursor: pointer; font-size: 14px; font-family: inherit; }
        .btn-novo { background: #4a90d9; }
        .btn-editar { background: #f0a500; }
        .btn-deletar { background: #e74c3c; }
        .alerta { padding: 12px; border-radius: 4px; margin-bottom: 16px; background: #fdecea; color: #b71c1c; }
        .busca { margin: 16px 0; }
        .busca input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 280px; }
        .vazio { padding: 16px; color: #777; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: block; }
        .avatar-vazio { background: #ddd; }
    </style>
</head>
<body>
    <h1>📋 Agenda de Contatos</h1>
    <div class="alerta" th:if="${mensagem}" th:text="${mensagem}"></div>
    <a href="/contatos/novo" class="btn btn-novo">+ Novo Contato</a>

    <form class="busca" method="get" th:action="@{/contatos}">
        <input type="text" id="busca" name="busca" th:value="${busca}" placeholder="Buscar por nome ou telefone" autocomplete="off"/>
        <button type="submit" class="btn btn-novo">Buscar</button>
        <a th:if="${busca}" th:href="@{/contatos}" class="btn btn-editar">Limpar</a>
    </form>

    <div id="resultados" th:fragment="resultados">
        <p class="vazio" th:if="${#lists.isEmpty(contatos)}">Nenhum contato encontrado.</p>

        <table th:unless="${#lists.isEmpty(contatos)}">
            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Email</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="contato : ${contatos}">
                    <td>
                        <img th:if="${contato.foto != null}" class="avatar"
                             th:src="@{/contatos/{id}/foto(id=${contato.id})}" alt="Foto"/>
                        <span th:unless="${contato.foto != null}" class="avatar avatar-vazio"></span>
                    </td>
                    <td th:text="${contato.nome}"></td>
                    <td th:text="${contato.telefone}"></td>
                    <td th:text="${contato.email}"></td>
                    <td>
                        <a th:href="@{/contatos/editar/{id}(id=${contato.id})}"
                           class="btn btn-editar">Editar</a>
                        <form th:action="@{/contatos/deletar/{id}(id=${contato.id})}" method="post"
                              style="display:inline"
                              onsubmit="return confirm('Deseja deletar?')">
                            <button type="submit" class="btn btn-deletar">Deletar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">
        const url = /*[[@{/contatos/buscar}]]*/ '/contatos/buscar';
        const campo = document.getElementById('busca');
        let timer;
        campo.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                fetch(url + '?busca=' + encodeURIComponent(campo.value))
                    .then(r => r.text())
                    .then(html => { document.getElementById('resultados').outerHTML = html; });
            }, 300);
        });
    </script>
</body>
</html>
