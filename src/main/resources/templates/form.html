<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Contato</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { color: #333; }
        form { background: white; padding: 24px; border-radius: 8px; width: 400px; }
        label { display: block; margin-top: 12px; color: #555; }
        input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { margin-top: 16px; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-salvar { background: #4a90d9; color: white; }
        .btn-voltar { background: #aaa; color: white; text-decoration: none; padding: 10px 20px; border-radius: 4px; }
        .erro { color: #e74c3c; font-size: 13px; margin-top: 4px; display: block; }
    </style>
</head>
<body>
    <h1>📝 Formulário de Contato</h1>
    <form th:action="@{/contatos/salvar}" th:object="${contato}" method="post">
        <input type="hidden" th:field="*{id}"/>
        
        <label>Nome:</label>
        <input type="text" th:field="*{nome}" placeholder="Digite o nome"/>
        <span class="erro" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>

        <label>Telefone:</label>
        <input type="text" th:field="*{telefone}" placeholder="Digite o telefone"/>
        <span class="erro" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></span>

        <label>Email:</label>
        <input type="email" th:field="*{email}" placeholder="Digite o email"/>
        <span class="erro" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        
        <br><br>
        <button type="submit" class="btn btn-salvar">💾 Salvar</button>
        <a href="/contatos" class="btn btn-voltar">← Voltar</a>
    </form>
</body>
</html>
